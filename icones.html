const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
const toast = document.getElementById('toast');
let toastTimer;

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 1500);
}

function makeSVGString(path) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"><g transform="scale(0.024,-0.024) translate(0,-${UPM})"><path d="${path}" fill="currentColor"/></g></svg>`;
}

function makePreviewSVG(path, size) {
  return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${UPM} ${UPM}" width="${size}" height="${size}"><g transform="scale(1,-1) translate(0,-${UPM})"><path d="${path}" fill="#1a1a1a"/></g></svg>`;
}

function render(list) {
  stats.textContent = list.length + ' ícones';
  grid.innerHTML = '';
  list.forEach(({code, path}) => {
    const svgString = makeSVGString(path);
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.title = `Clique para copiar SVG — U+${code}`;
    cell.innerHTML = `
      ${makePreviewSVG(path, 28)}
      <div class="code">U+${code}</div>
      <span class="badge">copiado</span>
    `;
    cell.addEventListener('click', () => {
      navigator.clipboard.writeText(svgString).catch(() => {});
      cell.classList.add('copied');
      setTimeout(() => cell.classList.remove('copied'), 1200);
      showToast('SVG copiado — cole no Figma com Ctrl+V');
    });
    grid.appendChild(cell);
  });
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.trim().toUpperCase().replace('U+', '');
  render(q ? ICONS.filter(i => i.code.includes(q)) : ICONS);
});

render(ICONS);
</script>
